syntax = "proto3";

package sidcord.user.v1;

option go_package = "github.com/sidcord/proto/gen/go/user/v1;userv1";

// İlk iskelet — Faz 1'de genişletilecek
message User {
  string id = 1;          // Snowflake ID
  string username = 2;
  string discriminator = 3;  // #1234 stili (opsiyonel — Discord 2023'te kaldırdı, biz başta tutalım)
  string display_name = 4;
  string avatar_url = 5;
  int64 created_at = 6;
}

service UserService {
  rpc GetUser(GetUserRequest) returns (User);
}

message GetUserRequest {
  string id = 1;
}
