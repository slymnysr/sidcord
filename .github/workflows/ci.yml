name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

jobs:
  web:
    name: Web (React/Vite)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/web
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v3
        with:
          version: 9
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "pnpm"
          cache-dependency-path: pnpm-lock.yaml
      - name: Install
        run: pnpm install --frozen-lockfile
        working-directory: ${{ github.workspace }}
      - name: Type-check
        run: pnpm type-check
      - name: Lint
        run: pnpm lint
      - name: Build
        run: pnpm build

  api:
    name: API (Go)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/api
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: "1.22"
          cache-dependency-path: apps/api/go.sum
      - run: go mod download
      - run: go vet ./...
      - run: go test -race -cover ./...
      - run: go build -o bin/api ./cmd/api

  gateway:
    name: Gateway (Elixir/Phoenix)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/gateway
    steps:
      - uses: actions/checkout@v4
      - uses: erlef/setup-beam@v1
        with:
          elixir-version: "1.16"
          otp-version: "26"
      - name: Cache deps
        uses: actions/cache@v4
        with:
          path: |
            apps/gateway/deps
            apps/gateway/_build
          key: ${{ runner.os }}-mix-${{ hashFiles('apps/gateway/mix.lock') }}
      - run: mix deps.get
      - run: mix compile --warnings-as-errors
      - run: mix test

  lint-format:
    name: Format check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v3
        with:
          version: 9
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      - run: pnpm install --frozen-lockfile
      - run: pnpm exec prettier --check "**/*.{ts,tsx,js,jsx,json,md,yaml,yml}"
