# Sidcord masaüstü paketleri — Windows (.msi/.exe) + Linux (.deb/.AppImage)
# v* tag'inde: GitHub Release oluşturur, imzalı paketleri + oto-güncelleme latest.json'unu yükler.
# Manuel tetiklemede (workflow_dispatch): yalnızca build + artifact (release yok).
name: Desktop Build

on:
  workflow_dispatch:
  push:
    tags: ['v*']

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: windows-latest
            args: ''
          - platform: ubuntu-22.04
            args: ''
    runs-on: ${{ matrix.platform }}
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Linux sistem bağımlılıkları
        if: matrix.platform == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev build-essential curl wget file \
            libxdo-dev libssl-dev libayatana-appindicator3-dev librsvg2-dev

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - uses: dtolnay/rust-toolchain@stable

      - uses: swatinem/rust-cache@v2
        with:
          workspaces: apps/desktop/src-tauri

      - name: Bağımlılıkları kur
        run: pnpm install --frozen-lockfile

      - name: Tauri build (+ tag'de release)
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ""
        with:
          projectPath: apps/desktop
          # Tag push'unda release oluştur + asset'leri ve latest.json'u yükle
          tagName: ${{ startsWith(github.ref, 'refs/tags/') && github.ref_name || '' }}
          releaseName: ${{ startsWith(github.ref, 'refs/tags/') && format('Sidcord {0}', github.ref_name) || '' }}
          releaseDraft: false
          includeUpdaterJson: true
          args: ${{ matrix.args }}

      - name: Paketleri yükle (artifact)
        uses: actions/upload-artifact@v4
        with:
          name: sidcord-desktop-${{ matrix.platform }}
          path: |
            apps/desktop/src-tauri/target/release/bundle/msi/*.msi
            apps/desktop/src-tauri/target/release/bundle/nsis/*.exe
            apps/desktop/src-tauri/target/release/bundle/deb/*.deb
            apps/desktop/src-tauri/target/release/bundle/appimage/*.AppImage
          if-no-files-found: ignore
