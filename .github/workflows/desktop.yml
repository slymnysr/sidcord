# Sidcord masaüstü paketleri — Windows (.msi/.exe) + Linux (.deb/.AppImage)
# Manuel tetiklenir (workflow_dispatch) veya v* tag'i push'lanınca çalışır.
name: Desktop Build

on:
  workflow_dispatch:
  push:
    tags: ['v*']

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: windows-latest
            args: ''
          - platform: ubuntu-22.04
            args: ''
    runs-on: ${{ matrix.platform }}
    steps:
      - uses: actions/checkout@v4

      - name: Linux sistem bağımlılıkları
        if: matrix.platform == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev build-essential curl wget file \
            libxdo-dev libssl-dev libayatana-appindicator3-dev librsvg2-dev

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - uses: dtolnay/rust-toolchain@stable

      - uses: swatinem/rust-cache@v2
        with:
          workspaces: apps/desktop/src-tauri

      - name: Bağımlılıkları kur
        run: pnpm install --frozen-lockfile

      - name: Tauri build
        uses: tauri-apps/tauri-action@v0
        with:
          projectPath: apps/desktop
          args: ${{ matrix.args }}

      - name: Paketleri yükle (artifact)
        uses: actions/upload-artifact@v4
        with:
          name: sidcord-desktop-${{ matrix.platform }}
          path: |
            apps/desktop/src-tauri/target/release/bundle/msi/*.msi
            apps/desktop/src-tauri/target/release/bundle/nsis/*.exe
            apps/desktop/src-tauri/target/release/bundle/deb/*.deb
            apps/desktop/src-tauri/target/release/bundle/appimage/*.AppImage
          if-no-files-found: ignore
